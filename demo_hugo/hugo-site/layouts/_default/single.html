{{ define "main" }}
<article class="content post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 de January, 2006" }}</time>
  </header>

  <div class="post-body">
    {{ .Content }}
  </div>

  <nav class="post-nav">
    <a href="/" class="back-link">&larr; Volver al inicio</a>
  </nav>
</article>
{{ end }}
