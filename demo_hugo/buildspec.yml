version: 0.2

env:
  variables:
    HUGO_VERSION: "0.121.0"
  exported-variables:
    - HUGO_VERSION

phases:
  install:
    runtime-versions:
      golang: 1.21
    commands:
      - echo "=== Instalando Hugo ${HUGO_VERSION} ==="
      - wget -q https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
      - tar -xzf hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
      - mv hugo /usr/local/bin/
      - hugo version

  pre_build:
    commands:
      - echo "=== Pre-build checks ==="
      - cd demo_hugo/hugo-site
      - ls -la themes/PaperMod/

  build:
    commands:
      - echo "=== Construyendo el sitio ==="
      - hugo --minify --gc
      - echo "=== Archivos generados ==="
      - ls -la public/

  post_build:
    commands:
      - echo "=== Desplegando a S3 ==="
      - aws s3 sync public/ s3://${BUCKET_NAME}/ --delete --cache-control "public, max-age=3600"
      - echo "=== Invalidando cache CloudFront ==="
      - aws cloudfront create-invalidation --distribution-id ${DISTRIBUTION_ID} --paths "/*"
      - echo "=== Deploy completado ==="

artifacts:
  files:
    - '**/*'
  base-directory: demo_hugo/hugo-site/public

cache:
  paths:
    - '/root/.cache/hugo/**/*'
